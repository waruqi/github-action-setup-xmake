name: test

on: 
- push

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macOS-latest]

    runs-on: ${{ matrix.os }}
    
    steps:
    - uses: actions/checkout@v1
    - uses: waruqi/github-action-setup-xmake@test
      with:
        xmake-version: branch@test
    - name: Run tests
      run: |
        xmake create -P test
        xmake build -P test
        xmake run -P test
